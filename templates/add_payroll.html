{% extends "base.html" %}

{% block title %}إضافة راتب{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">➕ إضافة راتب</h2>
    <form method="POST" class="p-4 border rounded shadow-sm bg-light">
        
        <div class="mb-3">
            <label class="form-label">الموظف:</label>
            <select name="employee_id" class="form-select" required>
                {% for emp in employees %}
                    <option value="{{ emp[0] }}">{{ emp[1] }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">الراتب الأساسي:</label>
            <input type="number" step="0.01" name="salary" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">المكافآت:</label>
            <input type="number" step="0.01" name="bonus" class="form-control" value="0">
        </div>

        <div class="mb-3">
            <label class="form-label">الخصومات:</label>
            <input type="number" step="0.01" name="deductions" class="form-control" value="0">
        </div>

        <div class="mb-3">
            <label class="form-label">تاريخ الدفع:</label>
            <input type="date" name="payment_date" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">💾 حفظ</button>
    </form>
    
    <script>
        document.querySelector("select[name='employee_id']").addEventListener("change", function() {
            let empId = this.value;
            if (empId) {
                fetch(`/get_salary/${empId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.salary !== null) {
                        document.querySelector("input[name='salary']").value = data.salary;
                    } else {
                        document.querySelector("input[name='salary']").value = "";
                    }
                });
            }
        });
        </script>
</div>
{% endblock %}
