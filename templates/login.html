<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | نظام الموارد البشرية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --p:#0f766e;--p2:#14b8a6;--d:#0d9488;
            --bg:#f0fdfa;--card:#fff;
            --txt:#134e4a;--muted:#94a3b8;
            --border:rgba(20,184,166,.2);
            --shadow:0 20px 40px rgba(15,118,110,.15);
            }
            
            *{box-sizing:border-box}
            
            body{
            margin:0;min-height:100vh;
            display:flex;align-items:center;justify-content:center;
            padding:1.5rem;direction:rtl;
            font-family:'Segoe UI',sans-serif;
            background:var(--bg);
            background:
            radial-gradient(circle at top,rgba(20,184,166,.25),transparent 60%),
            radial-gradient(circle at left,rgba(15,118,110,.1),transparent 50%),
            radial-gradient(circle at right,rgba(15,118,110,.1),transparent 50%);
            }
            
            /* WRAPPER */
            .login-wrapper{max-width:420px;width:100%;animation:up .4s ease}
            @keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1}}
            
            /* CARD */
            .login-card{
            background:var(--card);
            padding:2.2rem 1.8rem;
            border-radius:18px;
            box-shadow:var(--shadow);
            border:1px solid var(--border);
            transition:.3s;
            }
            .login-card:hover{transform:translateY(-3px)}
            
            /* HEADER */
            .login-header{text-align:center;margin-bottom:1.5rem}
            
            .login-icon{
            width:60px;height:60px;
            margin:auto auto 1rem;
            border-radius:14px;
            display:flex;align-items:center;justify-content:center;
            font-size:1.6rem;
            color:#fff;
            background:linear-gradient(135deg,var(--p),var(--p2));
            box-shadow:0 10px 25px rgba(15,118,110,.25);
            }
            
            h1{margin:0;font-size:1.4rem;color:var(--txt)}
            .subtitle{font-size:.9rem;color:var(--muted)}
            
            /* FORM */
            .form-label{font-size:.9rem;font-weight:600;color:var(--txt)}
            
            .form-control{
            width:100%;
            padding:.75rem 1rem;
            border:1px solid var(--border);
            border-radius:12px;
            transition:.2s;
            text-align:right;
            }
            
            .form-control:focus{
            border-color:var(--p2);
            box-shadow:0 0 0 3px rgba(20,184,166,.2);
            outline:none;
            }
            
            .mb-3{margin-bottom:1rem}
            
            /* BUTTON */
            .btn-login{
            width:100%;
            padding:.9rem;
            border:none;
            border-radius:12px;
            font-weight:700;
            color:#fff;
            cursor:pointer;
            background:linear-gradient(135deg,var(--p),var(--d));
            box-shadow:0 8px 20px rgba(15,118,110,.3);
            transition:.2s;
            }
            
            .btn-login:hover{
            transform:translateY(-2px);
            opacity:.95;
            }
            
            /* ALERT */
            .alert-danger{
            background:#fef2f2;
            color:#b91c1c;
            border:1px solid #fecaca;
            padding:.8rem;
            border-radius:12px;
            text-align:center;
            margin-bottom:1rem;
            font-size:.9rem;
            }
            
            /* FOOTER */
            .footer-text{
            text-align:center;
            margin-top:1.2rem;
            font-size:.8rem;
            color:var(--muted);
            }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">👤</div>
                <h1>نظام الموارد البشرية (HR System)</h1>
                <p class="subtitle">تسجيل دخول المسؤول</p>
            </div>

            {% if error %}
                <div class="alert alert-danger">
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label" for="username">اسم المسؤول</label>
                    <input type="text"
                           id="username"
                           class="form-control"
                           name="username"
                           placeholder="أدخل اسم المسؤول"
                           autocomplete="username"
                           required
                           autofocus>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="password">كلمة المرور</label>
                    <input type="password"
                           id="password"
                           class="form-control"
                           name="password"
                           placeholder="أدخل كلمة المرور"
                           autocomplete="current-password"
                           required>
                </div>

                <button type="submit" class="btn btn-login">
                    تسجيل الدخول
                </button>
            </form>
        </div>
        <p class="footer-text">نظام إدارة الموارد البشرية ©</p>
    </div>

</body>
</html>
